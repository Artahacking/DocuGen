{% extends 'base.html' %}

{% block content %}

<div class="pernyataan-page">

    <div class="statement-card">

        <!-- HEADER -->
        <div class="statement-header">

            <div class="header-left">

                <div class="icon-box">
                    ✍️
                </div>

                <div>

                    <span class="mini-badge">
                        FORM SURAT
                    </span>

                    <h2>
                        Surat Pernyataan
                    </h2>

                    <p>
                        Formulir resmi pembuatan surat pernyataan pegawai.
                    </p>

                </div>

            </div>

        </div>

        <!-- FORM -->
        <form method="post">

            <!-- ======================== -->
            <!-- INFORMASI SURAT -->
            <!-- ======================== -->

            <div class="content-box">

                <div class="content-title">

                    <div class="title-line"></div>

                    <h3>
                        Informasi Surat
                    </h3>

                </div>

                <div class="form-grid">

                    <div class="form-group">

                        <label>Judul Arsip</label>

                        <input
                            type="text"
                            name="judul"
                            value="{{ surat.judul if surat else 'Surat Pernyataan' }}"
                            placeholder="Masukkan judul arsip">

                    </div>

                    <div class="form-group">

                        <label>Status Surat</label>

                        <select name="status">

                            <option value="Selesai"
                                {% if surat and surat.status=='Selesai' %}
                                    selected
                                {% endif %}
                            >
                                Selesai
                            </option>

                            <option value="Draft"
                                {% if surat and surat.status=='Draft' %}
                                    selected
                                {% endif %}
                            >
                                Draft
                            </option>

                        </select>

                    </div>

                </div>

            </div>

            <!-- ======================== -->
            <!-- DATA PEGAWAI -->
            <!-- ======================== -->

            <div class="content-box">

                <div class="content-title">

                    <div class="title-line"></div>

                    <h3>
                        Data Pegawai
                    </h3>

                </div>

                <div class="form-grid">

                    <div class="form-group">

                        <label>Nama Lengkap</label>

                        <input
                            type="text"
                            name="nama"
                            value="{{ data.nama }}"
                            placeholder="Nama lengkap"
                            required>

                    </div>

                    <div class="form-group">

                        <label>NIP</label>

                        <input
                            type="text"
                            name="nip"
                            value="{{ data.nip }}"
                            placeholder="Nomor Induk Pegawai"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Jabatan</label>

                        <input
                            type="text"
                            name="jabatan"
                            value="{{ data.jabatan }}"
                            placeholder="Masukkan jabatan">

                    </div>

                    <div class="form-group">

                        <label>Unit Organisasi</label>

                        <input
                            type="text"
                            name="unit_organisasi"
                            value="{{ data.unit_organisasi }}"
                            placeholder="Masukkan unit organisasi">

                    </div>

                </div>

            </div>

            <!-- ======================== -->
            <!-- ISI PERNYATAAN -->
            <!-- ======================== -->

            <div class="content-box">

                <div class="content-title">

                    <div class="title-line"></div>

                    <h3>
                        Isi Pernyataan
                    </h3>

                </div>

                <div class="form-group">

                    <label>Isi Surat Pernyataan</label>

                    <textarea
                        id="editor"
                        name="isi_pernyataan"
                        placeholder="Tuliskan isi surat pernyataan di sini...">{{ data.isi_pernyataan }}</textarea>

                </div>

            </div>

            <!-- ======================== -->
            <!-- PENANDATANGAN -->
            <!-- ======================== -->

            <div class="content-box">

                <div class="content-title">

                    <div class="title-line"></div>

                    <h3>
                        Penandatangan
                    </h3>

                </div>

                <div class="form-grid">

                    <div class="form-group">

                        <label>Tempat TTD</label>

                        <input
                            type="text"
                            name="ttd_tempat"
                            value="{{ data.ttd_tempat }}"
                            placeholder="Contoh : Pangkalan Brandan">

                    </div>

                    <div class="form-group">

                        <label>Tanggal TTD</label>

                        <input
                            type="text"
                            name="ttd_tanggal"
                            value="{{ data.ttd_tanggal }}"
                            placeholder="Contoh : 04 April 2026">

                    </div>

                    <div class="form-group">

                        <label>Nama Menyetujui</label>

                        <input
                            type="text"
                            name="menyetujui_nama"
                            value="{{ data.menyetujui_nama }}"
                            placeholder="Nama pejabat mengetahui">

                    </div>

                    <div class="form-group">

                        <label>Nama Penandatangan</label>

                        <input
                            type="text"
                            name="ttd_nama"
                            value="{{ data.ttd_nama }}"
                            placeholder="Nama penandatangan">

                    </div>

                </div>

            </div>

            <!-- BUTTON -->
            <div class="button-area">

                <button class="btn-save">

                    💾 Simpan & Preview

                </button>

            </div>

        </form>

    </div>

</div>

<!-- CKEDITOR -->
<script src="https://cdn.ckeditor.com/4.21.0/standard/ckeditor.js"></script>

<script>

    CKEDITOR.replace('editor', {
        height: 250
    });

</script>

<style>

    .pernyataan-page{
        width:100%;
    }

    .statement-card{

        background:white;

        border-radius:30px;

        padding:38px;

        border:1px solid #e5e7eb;

        box-shadow:
        0 15px 45px rgba(15,23,42,.08);

        position:relative;

        overflow:hidden;
    }

    .statement-card::before{

        content:'';

        position:absolute;

        top:-120px;
        right:-120px;

        width:280px;
        height:280px;

        background:
        radial-gradient(
            circle,
            rgba(37,99,235,.12),
            transparent 70%
        );

        border-radius:50%;
    }

    .statement-header{

        display:flex;

        align-items:center;

        justify-content:space-between;

        margin-bottom:35px;

        position:relative;

        z-index:2;
    }

    .header-left{

        display:flex;

        align-items:center;

        gap:20px;
    }

    .icon-box{

        width:78px;
        height:78px;

        border-radius:24px;

        background:
        linear-gradient(
            135deg,
            #2563eb,
            #3b82f6
        );

        display:grid;
        place-items:center;

        font-size:34px;

        color:white;

        box-shadow:
        0 15px 30px rgba(37,99,235,.25);
    }

    .mini-badge{

        display:inline-block;

        background:#eff6ff;

        color:#2563eb;

        padding:8px 14px;

        border-radius:999px;

        font-size:12px;
        font-weight:800;

        letter-spacing:.5px;

        margin-bottom:12px;
    }

    .statement-header h2{

        font-size:34px;

        color:#0f172a;

        margin-bottom:8px;
    }

    .statement-header p{

        color:#64748b;

        font-size:15px;
    }

    .content-box{

        background:#f8fbff;

        border:1px solid #e4edf8;

        border-radius:24px;

        padding:26px;

        margin-bottom:26px;

        position:relative;
    }

    .content-title{

        display:flex;

        align-items:center;

        gap:14px;

        margin-bottom:24px;
    }

    .title-line{

        width:6px;
        height:28px;

        border-radius:999px;

        background:
        linear-gradient(
            180deg,
            #2563eb,
            #60a5fa
        );
    }

    .content-title h3{

        font-size:21px;

        color:#0f172a;

        font-weight:800;
    }

    .form-grid{

        display:grid;

        grid-template-columns:
        repeat(2,1fr);

        gap:20px;
    }

    .form-group{

        display:flex;

        flex-direction:column;

        gap:8px;
    }

    .form-group label{

        font-size:14px;

        font-weight:700;

        color:#1e293b;
    }

    input,
    select,
    textarea{

        width:100%;

        padding:15px 16px;

        border-radius:16px;

        border:1px solid #dbe3ef;

        background:white;

        font-size:15px;

        transition:.25s ease;
    }

    input:focus,
    select:focus,
    textarea:focus{

        outline:none;

        border-color:#2563eb;

        box-shadow:
        0 0 0 4px rgba(37,99,235,.10);
    }

    textarea{

        min-height:240px;

        resize:vertical;

        line-height:1.8;
    }

    .button-area{

        display:flex;

        justify-content:flex-end;

        margin-top:10px;
    }

    .btn-save{

        border:none;

        background:
        linear-gradient(
            135deg,
            #2563eb,
            #3b82f6
        );

        color:white;

        padding:16px 28px;

        border-radius:18px;

        font-size:16px;
        font-weight:800;

        cursor:pointer;

        transition:.25s ease;

        box-shadow:
        0 15px 30px rgba(37,99,235,.25);
    }

    .btn-save:hover{

        transform:translateY(-3px);

        box-shadow:
        0 18px 35px rgba(37,99,235,.35);
    }

    @media(max-width:1000px){

        .form-grid{
            grid-template-columns:1fr;
        }

        .statement-card{
            padding:24px;
        }

        .statement-header h2{
            font-size:28px;
        }

        .header-left{
            flex-direction:column;
            align-items:flex-start;
        }

        .button-area{
            justify-content:stretch;
        }

        .btn-save{
            width:100%;
        }

    }

</style>

{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <style>
        @page {
            size: A4;
            margin: 2cm;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #000;
        }

        .judul {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .tanggal {
            text-align: center;
            font-size: 11px;
            margin-bottom: 20px;
        }

        .filter {
            font-size: 11px;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            border: 1px solid #000;
            padding: 7px;
            text-align: center;
            background-color: #eeeeee;
            font-weight: bold;
        }

        td {
            border: 1px solid #000;
            padding: 7px;
            vertical-align: top;
        }

        .no {
            width: 45px;
            text-align: center;
        }

        .no-surat {
            width: 230px;
        }

        .kosong {
            text-align: center;
            padding: 12px;
        }
    </style>
</head>

<body>

    <div class="judul">
        Daftar Catatan No Surat
    </div>

    <div class="tanggal">
        Dicetak pada: {{ tanggal_cetak }}
    </div>

    {% if q %}
        <div class="filter">
            Filter pencarian: <strong>{{ q }}</strong>
        </div>
    {% endif %}

    <table>
        <thead>
            <tr>
                <th class="no">No</th>
                <th class="no-surat">No Surat</th>
                <th>Keterangan</th>
            </tr>
        </thead>

        <tbody>
            {% for r in rows %}
            <tr>
                <td class="no">{{ loop.index }}</td>
                <td>{{ r.no_surat }}</td>
                <td>{{ r.keterangan }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="kosong">
                    Belum ada catatan no surat.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
